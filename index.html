<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useMemo,useCallback,useRef}=React;

/* ─── helpers ──────────────────────────────────────────────────── */
// Converte qualquer valor para número seguro — nunca retorna NaN
const toNum=v=>{const n=Number(v);return isFinite(n)?n:0;};
const fmt=v=>new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(toNum(v));
const fmtD=s=>{if(!s)return'---';const[y,m,d]=s.split('-');return`${d}/${m}/${y}`;};
const uid=()=>Math.random().toString(36).slice(2)+Date.now().toString(36);
const today=()=>new Date().toISOString().slice(0,10);

// Normaliza paymentDate: só aceita string no formato YYYY-MM-DD (10 chars)
// Qualquer outra coisa (null, undefined, "", "null", data parcial) → null
const normPaid=v=>(typeof v==='string'&&/^\d{4}-\d{2}-\d{2}$/.test(v.trim()))?v.trim():null;

const CATS=['Cartão Itaú Black','Cartão Itaú Zero','Cartão Nubank','Enel','Sabesp',
            'Aluguel','Telefone e internet','Alimentação','Lazer','Saúde','Transporte','Trabalho','Outros'];
const MNAMES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
              'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

/* ─── firebase ─────────────────────────────────────────────────── */
function waitFB(cb,n=0){
  if(window.__FB__)return cb(window.__FB__);
  if(n>100)return console.error('FB timeout');
  setTimeout(()=>waitFB(cb,n+1),100);
}

/* ─── export / import ──────────────────────────────────────────── */
function doExport(email,txs){
  const b=new Blob([JSON.stringify({version:1,exportedAt:new Date().toISOString(),user:{email},transactions:txs},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download=`financas-backup-${today()}.json`;a.click();
}
function doImport(file,current,ok,err){
  const r=new FileReader();
  r.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(!Array.isArray(d.transactions))throw 0;
      const ids=new Set(current.map(t=>t.id));
      ok([...current,...d.transactions.filter(t=>!ids.has(t.id))]);
    }catch{err('Arquivo inválido.');}
  };
  r.readAsText(file);
}

/* ─── ícones ───────────────────────────────────────────────────── */

);
const I={

  Edit:  p=><Ic {...p} d={["M12 20h9","M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"]}/>,

  ChR:   p=><Ic {...p} d="M9 18l6-6-6-6"/>,
  Cloud: p=><Ic {...p} d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>,
  Cal:   p=><Ic {...p} d={["M8 2v4","M16 2v4","M3 10h18","M21 8a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2z"]}/>,
  Bank:  p=><Ic {...p} d={["M3 22h18","M6 18V11","M10 18V11","M14 18V11","M18 18V11","M12 2 2 7h20z"]}/>,
  Home:  p=><Ic {...p} d={["M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z","M9 22V12h6v10"]}/>,
  Card:  p=><Ic {...p} d={["M1 4h22v16H1z","M1 10h22"]}/>,
  Zap:   p=><Ic {...p} f={p.c} d="M13 2 3 14h9l-1 8 10-12h-9l1-8z"/>,
  Drop:  p=><Ic {...p} d={["M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"]}/>,
  Wifi:  p=><Ic {...p} d={["M5 12.55a11 11 0 0 1 14.08 0","M1.42 9a16 16 0 0 1 21.16 0","M8.53 16.11a6 6 0 0 1 6.95 0","M12 20h.01"]}/>,
  Fork:  p=><Ic {...p} d={["M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2","M7 2v20","M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"]}/>,
  Out:   p=><Ic {...p} d={["M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4","M16 17l5-5-5-5","M21 12H9"]}/>,
  Mail:  p=><Ic {...p} d={["M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z","M22 6l-10 7L2 6"]}/>,
  Lock:  p=><Ic {...p} d={["M19 11H5a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2z","M7 11V7a5 5 0 0 1 10 0v4"]}/>,
  Eye:   p=><Ic {...p} d={["M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z","M12 9a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"]}/>,
  EyeX:  p=><Ic {...p} d={["M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24","M1 1l22 22"]}/>,
  User:  p=><Ic {...p} d={["M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2","M12 3a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"]}/>,
  Shld:  p=><Ic {...p} d={["M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z","M9 12l2 2 4-4"]}/>,
  Dl:    p=><Ic {...p} d={["M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4","M7 10l5 5 5-5","M12 15V3"]}/>,
  Ul:    p=><Ic {...p} d={["M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4","M17 8l-5-5-5 5","M12 3v12"]}/>,
  Warn:  p=><Ic {...p} d={["M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z","M12 9v4","M12 17h.01"]}/>,
  Check: p=><Ic {...p} d="M20 6 9 17l-5-5"/>,
};

/* ─── CatIcon ──────────────────────────────────────────────────── */
function CatIcon({cat,desc,type}){
  const n=(cat+' '+desc).toLowerCase();
  let Comp=I.Card,bg='rgba(100,100,120,.15)',c='#6B7280';
  if(type==='income')                                     {Comp=I.Up;  bg='rgba(34,197,94,.12)'; c='#22C55E';}
  else if(n.includes('aluguel'))                          {Comp=I.Home;bg='rgba(99,102,241,.12)';c='#818CF8';}
  else if(n.includes('enel'))                             {Comp=I.Zap; bg='rgba(245,158,11,.12)';c='#F59E0B';}
  else if(n.includes('sabesp'))                           {Comp=I.Drop;bg='rgba(59,130,246,.12)';c='#60A5FA';}
  else if(n.includes('telefone')||n.includes('internet')) {Comp=I.Wifi;bg='rgba(168,85,247,.12)';c='#C084FC';}
  else if(n.includes('nubank'))                           {Comp=I.Card;bg='rgba(168,85,247,.12)';c='#A855F7';}
  else if(n.includes('itaú')||n.includes('black')||n.includes('zero')){Comp=I.Card;bg='rgba(249,115,22,.12)';c='#FB923C';}
  else if(n.includes('aliment')||n.includes('almoço')||n.includes('café')){Comp=I.Fork;bg='rgba(239,68,68,.12)';c='#F87171';}
  return<div style={{width:46,height:46,borderRadius:16,background:bg,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><Comp s={20} c={c}/></div>;
}

/* ─── Modal ────────────────────────────────────────────────────── */
function Modal({children,onClose}){
  return(
    <div className="fi" style={{position:'fixed',inset:0,background:'rgba(0,0,0,.85)',backdropFilter:'blur(12px)',zIndex:50,display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
      <div className="su" style={{background:'#12141C',width:'100%',maxWidth:500,borderRadius:'32px 32px 0 0',padding:'24px 22px 48px',maxHeight:'95vh',overflowY:'auto',border:'1px solid rgba(255,255,255,.08)',borderBottom:'none'}}>
        <div style={{display:'flex',justifyContent:'flex-end',marginBottom:4}}>
          <button onClick={onClose} style={{background:'#1A1D26',border:'none',borderRadius:12,padding:8,cursor:'pointer',display:'flex'}}><I.X s={18} c="#5A5E75"/></button>
        </div>
        {children}
      </div>
    </div>
  );
}

/* ─── PaidToggle — checkbox real, seguro para PC e iOS ────────── */
// Usa checkbox nativo: evita o bug do Tab+Space no PC (botão em foco
// sendo ativado acidentalmente) e o bug de autofill do iOS Safari.
// paid = null (em aberto) ou string "YYYY-MM-DD" (pago).
function PaidToggle({paid, onChange}){
  const isPaid = normPaid(paid) !== null;
  const checkId = 'paid-check';
  return(
    <div>
      <label style={{fontSize:9,fontWeight:800,color:'#4A4E65',textTransform:'uppercase',letterSpacing:'.12em',display:'block',marginBottom:8,marginLeft:4}}>
        Pagamento
      </label>

      {/* Checkbox com label clicável */}
      <label
        htmlFor={checkId}
        style={{
          display:'flex',
          alignItems:'center',
          justifyContent:'space-between',
          padding:'13px 16px',
          borderRadius:16,
          border:`1.5px solid ${isPaid?'rgba(34,197,94,.4)':'rgba(255,255,255,.08)'}`,
          background:isPaid?'rgba(34,197,94,.07)':'#1A1D26',
          cursor:'pointer',
          transition:'all .2s',
          userSelect:'none',
        }}
      >
        <span style={{display:'flex',alignItems:'center',gap:10,color:isPaid?'#22C55E':'#5A5E75',fontWeight:600,fontSize:14}}>
          {/* caixa visual do checkbox */}
          <span style={{
            width:20,height:20,borderRadius:6,flexShrink:0,
            border:`2px solid ${isPaid?'#22C55E':'#3A3E55'}`,
            background:isPaid?'#22C55E':'transparent',
            display:'flex',alignItems:'center',justifyContent:'center',
            transition:'all .2s',
          }}>
            {isPaid && <I.Check s={12} c="#fff" sw={3}/>}
          </span>
          {isPaid ? 'Pago' : 'Em aberto'}
        </span>
        <span style={{fontSize:11,color:'#3A3E55'}}>
          {isPaid ? 'clique para desmarcar' : 'clique para marcar pago'}
        </span>
      </label>

      {/* Checkbox real — invisível, controlado pelo label acima */}
      <input
        id={checkId}
        type="checkbox"
        checked={isPaid}
        tabIndex={-1}
        onChange={e => onChange(e.target.checked ? today() : null)}
        style={{position:'absolute',opacity:0,width:0,height:0,pointerEvents:'none'}}
      />

      {/* Campo de data — só aparece quando marcado como pago */}
      {isPaid && (
        <div style={{marginTop:8}}>
          <label style={{fontSize:9,fontWeight:800,color:'#4A4E65',textTransform:'uppercase',letterSpacing:'.12em',display:'block',marginBottom:6,marginLeft:4}}>
            Data do Pagamento
          </label>
          <input
            className="field"
            type="date"
            tabIndex={0}
            autoComplete="off"
            value={normPaid(paid)||today()}
            onChange={e=>{
              const v = e.target.value;
              // só aceita data válida no formato YYYY-MM-DD
              if(v && /^\d{4}-\d{2}-\d{2}$/.test(v)) onChange(v);
            }}
            style={{fontSize:13}}
          />
        </div>
      )}
    </div>
  );
}

/* ─── TxCard ───────────────────────────────────────────────────── */
function TxCard({t,onEdit,onDel,onPay}){
  const[show,setShow]=useState(false);
  const amt=toNum(t.amount);
  const paidDate=normPaid(t.paymentDate);
  return(
    <div
      onTouchStart={()=>setShow(true)}
      onTouchEnd={()=>setTimeout(()=>setShow(false),2000)}
      onMouseEnter={()=>setShow(true)}
      onMouseLeave={()=>setShow(false)}
      style={{background:'#12141C',border:`1px solid ${show?'rgba(99,102,241,.3)':'rgba(255,255,255,.06)'}`,borderRadius:24,padding:18,display:'flex',flexDirection:'column',gap:14,transition:'border-color .2s'}}
    >
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{display:'flex',alignItems:'center',gap:12,flex:1,minWidth:0}}>
          <CatIcon cat={t.category||''} desc={t.description||''} type={t.type}/>
          <div style={{minWidth:0}}>
            <p style={{margin:0,fontSize:14,fontWeight:600,color:'#E8EAF0',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{t.description}</p>
            <span style={{fontSize:10,fontWeight:800,color:'#818CF8',background:'rgba(99,102,241,.1)',padding:'2px 8px',borderRadius:6,textTransform:'uppercase',letterSpacing:'.06em'}}>{t.category}</span>
          </div>
        </div>
        <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:8,flexShrink:0,marginLeft:10}}>
          <p className="syne" style={{margin:0,fontSize:14,fontWeight:800,color:t.type==='income'?'#22C55E':'#E8EAF0'}}>{t.type==='income'?'+ ':'- '}{fmt(amt)}</p>
          <div style={{display:'flex',gap:6,opacity:show?1:0,transition:'opacity .2s'}}>
            <button onClick={()=>onEdit(t)} style={{background:'rgba(99,102,241,.1)',border:'none',borderRadius:8,padding:6,cursor:'pointer',display:'flex'}}><I.Edit s={12} c="#818CF8"/></button>
            <button onClick={()=>onDel(t.id)} style={{background:'rgba(239,68,68,.1)',border:'none',borderRadius:8,padding:6,cursor:'pointer',display:'flex'}}><I.Trash s={12} c="#F87171"/></button>
          </div>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,paddingTop:12,borderTop:'1px solid rgba(255,255,255,.04)'}}>
        <div>
          <p style={{margin:'0 0 2px',fontSize:9,fontWeight:800,color:'#3A3E55',textTransform:'uppercase',letterSpacing:'.1em'}}>Vencimento</p>
          <p style={{margin:0,fontSize:12,fontWeight:600,color:'#8A8FA8'}}>{fmtD(t.dueDate||t.date)}</p>
        </div>
        <div style={{textAlign:'right'}}>
          <p style={{margin:'0 0 2px',fontSize:9,fontWeight:800,color:'#3A3E55',textTransform:'uppercase',letterSpacing:'.1em'}}>Pagamento</p>
          <p style={{margin:0,fontSize:12,fontWeight:600,color:paidDate?'#22C55E':'#F59E0B'}}>{paidDate?fmtD(paidDate):'Em Aberto'}</p>
        </div>
      </div>
      {t.type==='expense'&&!paidDate&&(
        <button onClick={()=>onPay(t.id)} style={{width:'100%',background:'rgba(99,102,241,.08)',border:'1px solid rgba(99,102,241,.15)',borderRadius:14,padding:12,color:'#818CF8',fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:10,letterSpacing:'.12em',textTransform:'uppercase',cursor:'pointer'}}>
          ✓ Marcar como Pago
        </button>
      )}
    </div>
  );
}

/* ─── AuthScreen ───────────────────────────────────────────────── */
function AuthScreen({onLogin}){
  const[mode,setMode]=useState('login');
  const[email,setEmail]=useState('');
  const[name,setName]=useState('');
  const[pass,setPass]=useState('');
  const[conf,setConf]=useState('');
  const[showPw,setShowPw]=useState(false);
  const[err,setErr]=useState('');
  const[load,setLoad]=useState(false);

  const submit=e=>{
    e.preventDefault();setErr('');setLoad(true);
    waitFB(({auth,createUserWithEmailAndPassword,signInWithEmailAndPassword,updateProfile})=>{
      if(mode==='register'){
        if(pass.length<6){setErr('Senha: mínimo 6 caracteres.');setLoad(false);return;}
        if(pass!==conf){setErr('Senhas não conferem.');setLoad(false);return;}
        createUserWithEmailAndPassword(auth,email.trim(),pass)
          .then(cr=>updateProfile(cr.user,{displayName:name}).then(()=>onLogin(cr.user)))
          .catch(e=>{
            if(e.code==='auth/email-already-in-use')setErr('E-mail já cadastrado.');
            else if(e.code==='auth/invalid-email')setErr('E-mail inválido.');
            else setErr('Erro ao criar conta.');
            setLoad(false);
          });
      }else{
        signInWithEmailAndPassword(auth,email.trim(),pass)
          .then(cr=>onLogin(cr.user))
          .catch(e=>{
            if(['auth/user-not-found','auth/wrong-password','auth/invalid-credential'].includes(e.code))
              setErr('E-mail ou senha incorretos.');
            else setErr('Erro ao entrar.');
            setLoad(false);
          });
      }
    });
  };

  return(
    <div style={{minHeight:'100vh',background:'#0D0F14',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div className="fu" style={{width:'100%',maxWidth:380}}>
        <div style={{textAlign:'center',marginBottom:40}}>
          <div className="pl" style={{width:72,height:72,background:'linear-gradient(135deg,#6366F1,#8B5CF6)',borderRadius:24,margin:'0 auto 20px',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <I.Wallet s={34} c="#fff"/>
          </div>
          <h1 className="syne" style={{margin:'0 0 8px',fontSize:32,fontWeight:800,background:'linear-gradient(135deg,#818CF8,#C084FC)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>
            Finanças <span style={{color:'#fff',WebkitTextFillColor:'#fff'}}>Pro</span>
          </h1>
          <p style={{margin:0,color:'#4A4E65',fontSize:14}}>{mode==='login'?'Bem-vindo de volta':'Crie sua conta gratuita'}</p>
        </div>
        <div style={{background:'#12141C',borderRadius:28,padding:28,border:'1px solid rgba(255,255,255,.06)'}}>
          <div style={{display:'flex',background:'#0D0F14',borderRadius:16,padding:4,marginBottom:24}}>
            {[['login','Entrar'],['register','Cadastrar']].map(([v,l])=>(
              <button key={v} onClick={()=>{setMode(v);setErr('');}}
                style={{flex:1,padding:12,borderRadius:12,border:'none',cursor:'pointer',fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:13,transition:'all .2s',
                  ...(mode===v?{background:'linear-gradient(135deg,#6366F1,#8B5CF6)',color:'#fff'}:{background:'transparent',color:'#3A3E55'})}}>
                {l}
              </button>
            ))}
          </div>
          <form onSubmit={submit} style={{display:'flex',flexDirection:'column',gap:12}}>
            {mode==='register'&&(
              <div style={{position:'relative'}}>
                <div style={{position:'absolute',left:16,top:'50%',transform:'translateY(-50%)'}}><I.User s={16} c="#4A4E65"/></div>
                <input className="field" style={{paddingLeft:44}} type="text" placeholder="Seu nome" value={name} onChange={e=>setName(e.target.value)} required/>
              </div>
            )}
            <div style={{position:'relative'}}>
              <div style={{position:'absolute',left:16,top:'50%',transform:'translateY(-50%)'}}><I.Mail s={16} c="#4A4E65"/></div>
              <input className="field" style={{paddingLeft:44}} type="email" placeholder="E-mail" value={email} onChange={e=>setEmail(e.target.value)} required/>
            </div>
            <div style={{position:'relative'}}>
              <div style={{position:'absolute',left:16,top:'50%',transform:'translateY(-50%)'}}><I.Lock s={16} c="#4A4E65"/></div>
              <input className="field" style={{paddingLeft:44,paddingRight:48}} type={showPw?'text':'password'} placeholder="Senha" value={pass} onChange={e=>setPass(e.target.value)} required/>
              <button type="button" onClick={()=>setShowPw(!showPw)} style={{position:'absolute',right:14,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',display:'flex'}}>
                {showPw?<I.EyeX s={16} c="#4A4E65"/>:<I.Eye s={16} c="#4A4E65"/>}
              </button>
            </div>
            {mode==='register'&&(
              <div style={{position:'relative'}}>
                <div style={{position:'absolute',left:16,top:'50%',transform:'translateY(-50%)'}}><I.Shld s={16} c="#4A4E65"/></div>
                <input className="field" style={{paddingLeft:44}} type={showPw?'text':'password'} placeholder="Confirmar senha" value={conf} onChange={e=>setConf(e.target.value)} required/>
              </div>
            )}
            {err&&<div style={{background:'rgba(239,68,68,.12)',border:'1px solid rgba(239,68,68,.3)',borderRadius:12,padding:'12px 16px',color:'#F87171',fontSize:13,fontWeight:500}}>{err}</div>}
            <button className="btn" type="submit" disabled={load} style={{marginTop:8,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
              {load?<div className="sp" style={{width:18,height:18,border:'2px solid rgba(255,255,255,.3)',borderTopColor:'#fff',borderRadius:'50%'}}/>:(mode==='login'?'Entrar na conta':'Criar conta')}
            </button>
          </form>
        </div>
        <p style={{textAlign:'center',color:'#2A2D3A',fontSize:12,marginTop:24}}>☁️ Dados sincronizados na nuvem</p>
      </div>
    </div>
  );
}

/* ─── App ──────────────────────────────────────────────────────── */
function App(){
  const[user,setUser]=useState(null);
  const[ready,setReady]=useState(false);
  const[txs,setTxs]=useState([]);
  const[saving,setSaving]=useState(false);
  const[showTx,setShowTx]=useState(false);
  const[editId,setEditId]=useState(null);
  const[showInv,setShowInv]=useState(false);
  const[selM,setSelM]=useState(new Date().getMonth());
  const[selY,setSelY]=useState(new Date().getFullYear());
  const[toast,setToast]=useState(null);

  // form: paid é null (em aberto) ou string de data "2026-03-01" (pago)
  const[form,setForm]=useState({type:'expense',desc:'',amt:'',due:'',paid:null,cat:CATS[0]});
  const[invF,setInvF]=useState({invType:'Tesouro Direto Selic',action:'Aporte',amt:'',date:today()});

  const impRef=useRef();
  const unsubRef=useRef(null);

  /* auth */
  useEffect(()=>{
    waitFB(({auth,onAuthStateChanged})=>{
      onAuthStateChanged(auth,u=>{setUser(u);setReady(true);});
    });
  },[]);

  /* firestore realtime */
  useEffect(()=>{
    if(unsubRef.current){unsubRef.current();unsubRef.current=null;}
    if(!user){setTxs([]);return;}
    waitFB(({db,doc,onSnapshot})=>{
      const ref=doc(db,'users',user.uid,'data','transactions');
      unsubRef.current=onSnapshot(ref,snap=>{
        if(snap.exists()){
          const list=(snap.data().list||[]).map(t=>({
            ...t,
            amount:toNum(t.amount),
            // normaliza paymentDate: garante null se vazio
            paymentDate:normPaid(t.paymentDate),
          }));
          setTxs(list);
        }else setTxs([]);
      },e=>console.error('snapshot error',e));
    });
    return()=>{if(unsubRef.current)unsubRef.current();};
  },[user]);

  /* save */
  const save=useCallback(async list=>{
    if(!user)return;
    setSaving(true);
    waitFB(async({db,doc,setDoc})=>{
      try{
        // normaliza antes de salvar: paymentDate nunca é "" no Firestore
        const clean=list.map(t=>({...t,paymentDate:normPaid(t.paymentDate)}));
        await setDoc(doc(db,'users',user.uid,'data','transactions'),{list:clean,updatedAt:new Date().toISOString()});
      }catch(e){console.error(e);}
      setSaving(false);
    });
  },[user]);

  const upd=async list=>{setTxs(list);await save(list);};
  const toast_=(msg,ok=true)=>{setToast({msg,ok});setTimeout(()=>setToast(null),3000);};
  const logout=()=>waitFB(({auth,signOut})=>signOut(auth).then(()=>setUser(null)));

  /* ── cálculos ──────────────────────────────────────────────────
     Regras definitivas:
     • globalBal = Σ receitas  −  Σ despesas PAGAS  (paymentDate não-nulo)
     • despesas em aberto NÃO afetam o saldo
     • summary do mês = entradas pagas / saídas pagas / em aberto
  ─────────────────────────────────────────────────────────────── */
  const globalBal=useMemo(()=>
    txs.filter(t=>!t.investmentType).reduce((s,t)=>{
      const v=toNum(t.amount);
      const paid=normPaid(t.paymentDate);
      if(t.type==='income') return s+v;
      if(t.type==='expense'&&paid) return s-v;
      return s;
    },0)
  ,[txs]);

  const invs=useMemo(()=>
    ['Tesouro Direto Selic','Crédito Privado Itaú'].map(type=>({
      type,
      bal:txs.filter(t=>t.investmentType===type)
            .reduce((s,t)=>s+(t.type==='income'?toNum(t.amount):-toNum(t.amount)),0),
    }))
  ,[txs]);

  const isInv=selM===-2;

  const filtered=useMemo(()=>{
    if(selM===-2)return[];
    return txs.filter(t=>{
      if(t.investmentType)return false;
      const d=t.dueDate||t.date||'';
      if(!d)return false;
      if(selM===-1)return parseInt(d.slice(0,4))===selY;
      const[y,m]=d.split('-');
      return parseInt(m)-1===selM&&parseInt(y)===selY;
    });
  },[txs,selM,selY]);

  const summary=useMemo(()=>({
    income: filtered.filter(t=>t.type==='income'&&normPaid(t.paymentDate)).reduce((s,t)=>s+toNum(t.amount),0),
    expense:filtered.filter(t=>t.type==='expense'&&normPaid(t.paymentDate)).reduce((s,t)=>s+toNum(t.amount),0),
    pending:filtered.filter(t=>t.type==='expense'&&!normPaid(t.paymentDate)).reduce((s,t)=>s+toNum(t.amount),0),
  }),[filtered]);

  /* ── ações ─────────────────────────────────────────────────── */
  const del=async id=>{await upd(txs.filter(t=>t.id!==id));toast_('Excluído.');};

  const pay=async id=>{
    await upd(txs.map(t=>t.id===id?{...t,paymentDate:today()}:t));
    toast_('Marcado como pago!');
  };

  const openAdd=()=>{
    setForm({type:'expense',desc:'',amt:'',due:'',paid:null,cat:CATS[0]});
    setEditId(null);setShowTx(true);
  };

  const openEdit=t=>{
    setForm({
      type:t.type,
      desc:t.description,
      amt:String(toNum(t.amount)),
      due:t.dueDate||'',
      paid:normPaid(t.paymentDate), // null ou string de data
      cat:t.category||CATS[0],
    });
    setEditId(t.id);setShowTx(true);
  };

  const submitTx=async e=>{
    e.preventDefault();
    const amount=toNum(form.amt);
    if(amount<=0){toast_('Valor inválido!',false);return;}
    const t={
      id:editId||uid(),
      type:form.type,
      description:form.desc.trim(),
      amount,
      dueDate:form.due,
      paymentDate:normPaid(form.paid), // garante null se em aberto
      category:form.cat,
      year:selY,
    };
    await upd(editId?txs.map(x=>x.id===editId?t:x):[...txs,t]);
    setShowTx(false);setEditId(null);
    toast_(editId?'Atualizado!':'Adicionado!');
  };

  const submitInv=async e=>{
    e.preventDefault();
    const amount=toNum(invF.amt);
    if(amount<=0){toast_('Valor inválido!',false);return;}
    await upd([...txs,{id:uid(),investmentType:invF.invType,type:'income',description:invF.action,amount,date:invF.date,category:'Investimento'}]);
    setShowInv(false);toast_('Movimentação registrada!');
  };

  /* ── render ────────────────────────────────────────────────── */
  if(!ready)return(
    <div style={{minHeight:'100vh',background:'#0D0F14',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div className="sp" style={{width:40,height:40,border:'3px solid rgba(99,102,241,.2)',borderTopColor:'#6366F1',borderRadius:'50%'}}/>
    </div>
  );
  if(!user)return<AuthScreen onLogin={setUser}/>;

  return(
    <div style={{maxWidth:500,margin:'0 auto',minHeight:'100vh',background:'#0D0F14',paddingBottom:100}}>

      {/* header */}
      <div style={{padding:'56px 20px 20px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div>
          <p style={{margin:0,fontSize:10,fontWeight:800,color:'#3A3E55',letterSpacing:'.15em',textTransform:'uppercase'}}>
            {saving?'⏳ Salvando...':'☁️ Sincronizado'}
          </p>
          <h2 className="syne" style={{margin:'4px 0 0',fontSize:22,fontWeight:800,color:'#E8EAF0'}}>
            {user.displayName||user.email?.split('@')[0]}
          </h2>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <button onClick={()=>doExport(user.email,txs.filter(t=>!t.investmentType))} title="Exportar"
            style={{background:'rgba(34,197,94,.1)',border:'1px solid rgba(34,197,94,.2)',borderRadius:12,padding:10,cursor:'pointer',display:'flex'}}>
            <I.Dl s={16} c="#22C55E"/>
          </button>
          <button onClick={()=>impRef.current.click()} title="Importar"
            style={{background:'rgba(139,92,246,.1)',border:'1px solid rgba(139,92,246,.2)',borderRadius:12,padding:10,cursor:'pointer',display:'flex'}}>
            <I.Ul s={16} c="#8B5CF6"/>
          </button>
          <input ref={impRef} type="file" accept=".json" style={{display:'none'}} onChange={e=>{
            const f=e.target.files[0];if(!f)return;
            doImport(f,txs,async m=>{await upd(m);toast_(`${m.length-txs.length} importados!`);},m=>toast_(m,false));
            e.target.value='';
          }}/>
          <button onClick={logout} title="Sair"
            style={{background:'rgba(248,113,113,.1)',border:'1px solid rgba(248,113,113,.2)',borderRadius:12,padding:10,cursor:'pointer',display:'flex'}}>
            <I.Out s={16} c="#F87171"/>
          </button>
        </div>
      </div>

      {/* seletor de ano */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:16,padding:'0 20px 16px'}}>
        <button onClick={()=>setSelY(y=>y-1)} style={{background:'#1A1D26',border:'1px solid rgba(255,255,255,.06)',borderRadius:10,padding:8,cursor:'pointer',display:'flex'}}><I.ChL s={16} c="#5A5E75"/></button>
        <span className="syne" style={{fontSize:18,fontWeight:800,color:'#E8EAF0',minWidth:60,textAlign:'center'}}>{selY}</span>
        <button onClick={()=>setSelY(y=>y+1)} style={{background:'#1A1D26',border:'1px solid rgba(255,255,255,.06)',borderRadius:10,padding:8,cursor:'pointer',display:'flex'}}><I.ChR s={16} c="#5A5E75"/></button>
      </div>

      {/* abas meses */}
      <div className="noscroll" style={{display:'flex',gap:6,overflowX:'auto',padding:'0 20px 20px'}}>
        {[[-1,'TODOS'],[-2,'APLIC.'],...MNAMES.map((m,i)=>[i,m.slice(0,3).toUpperCase()])].map(([i,lbl])=>(
          <button key={i} onClick={()=>setSelM(i)}
            style={{flexShrink:0,padding:'10px 16px',borderRadius:14,border:'none',cursor:'pointer',fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:11,letterSpacing:'.08em',transition:'all .2s',
              ...(selM===i?{background:'linear-gradient(135deg,#6366F1,#8B5CF6)',color:'#fff',boxShadow:'0 6px 20px rgba(99,102,241,.35)'}:{background:'#12141C',color:'#3A3E55',border:'1px solid rgba(255,255,255,.04)'})}}>
            {lbl}
          </button>
        ))}
      </div>

      {/* conteúdo */}
      <div style={{padding:'0 20px'}}>

        {/* aba aplicações */}
        {isInv?(
          <div className="fu" style={{display:'flex',flexDirection:'column',gap:16}}>
            {invs.map(inv=>(
              <div key={inv.type} style={{background:'linear-gradient(135deg,#1A1D26,#12141C)',border:'1px solid rgba(255,255,255,.08)',borderRadius:28,padding:24}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20}}>
                  <div>
                    <p className="syne" style={{margin:0,fontSize:10,fontWeight:800,color:'#4A4E65',letterSpacing:'.15em',textTransform:'uppercase'}}>{inv.type}</p>
                    <p className="syne" style={{margin:'6px 0 0',fontSize:26,fontWeight:800,color:'#818CF8'}}>{fmt(inv.bal)}</p>
                  </div>
                  <div style={{background:'rgba(99,102,241,.1)',borderRadius:16,padding:12}}><I.Bank s={22} c="#818CF8"/></div>
                </div>
                <button onClick={()=>{setInvF(f=>({...f,invType:inv.type}));setShowInv(true);}}
                  style={{width:'100%',background:'rgba(99,102,241,.08)',border:'1px solid rgba(99,102,241,.15)',borderRadius:14,padding:12,color:'#818CF8',fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:10,letterSpacing:'.12em',textTransform:'uppercase',cursor:'pointer'}}>
                  + Nova Movimentação
                </button>
              </div>
            ))}
          </div>

        ):(
          <div className="fu" style={{display:'flex',flexDirection:'column',gap:14}}>

            {/* saldo geral */}
            <div style={{background:'linear-gradient(135deg,#1E40AF,#3730A3)',borderRadius:28,padding:26,display:'flex',justifyContent:'space-between',alignItems:'center',boxShadow:'0 20px 50px rgba(30,64,175,.4)'}}>
              <div>
                <p className="syne" style={{margin:0,fontSize:10,fontWeight:800,color:'rgba(255,255,255,.5)',letterSpacing:'.15em',textTransform:'uppercase'}}>Saldo Geral Acumulado</p>
                <p className="syne" style={{margin:'8px 0 4px',fontSize:30,fontWeight:800,color:'#fff'}}>{fmt(globalBal)}</p>
                <p style={{margin:0,fontSize:10,color:'rgba(255,255,255,.4)'}}>Receitas − Despesas pagas</p>
              </div>
              <div style={{background:'rgba(255,255,255,.1)',borderRadius:20,padding:14}}><I.Cloud s={26} c="#fff"/></div>
            </div>

            {/* resumo entradas / saídas */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <div style={{background:'#12141C',border:'1px solid rgba(255,255,255,.06)',borderRadius:20,padding:16}}>
                <p style={{margin:'0 0 4px',fontSize:9,fontWeight:800,color:'#4A4E65',textTransform:'uppercase',letterSpacing:'.1em',display:'flex',alignItems:'center',gap:4}}>
                  <I.Up s={10} c="#22C55E"/> {selM===-1?'Entradas (ano)':'Entradas pagas'}
                </p>
                <p className="syne" style={{margin:0,fontSize:17,fontWeight:800,color:'#22C55E'}}>{fmt(summary.income)}</p>
              </div>
              <div style={{background:'#12141C',border:'1px solid rgba(255,255,255,.06)',borderRadius:20,padding:16}}>
                <p style={{margin:'0 0 4px',fontSize:9,fontWeight:800,color:'#4A4E65',textTransform:'uppercase',letterSpacing:'.1em',display:'flex',alignItems:'center',gap:4}}>
                  <I.Down s={10} c="#F87171"/> {selM===-1?'Saídas (ano)':'Saídas pagas'}
                </p>
                <p className="syne" style={{margin:0,fontSize:17,fontWeight:800,color:'#F87171'}}>{fmt(summary.expense)}</p>
              </div>
            </div>

            {/* em aberto */}
            {summary.pending>0&&(
              <div style={{background:'rgba(245,158,11,.07)',border:'1px solid rgba(245,158,11,.25)',borderRadius:16,padding:'14px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <I.Warn s={16} c="#F59E0B"/>
                  <span style={{fontSize:12,fontWeight:700,color:'#F59E0B'}}>Despesas em aberto</span>
                </div>
                <span className="syne" style={{fontSize:15,fontWeight:800,color:'#F59E0B'}}>{fmt(summary.pending)}</span>
              </div>
            )}

            {/* lista */}
            <div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,padding:'0 2px'}}>
                <p className="syne" style={{margin:0,fontSize:15,fontWeight:800,color:'#E8EAF0'}}>
                  {selM===-1?`Todos — ${selY}`:MNAMES[selM]}
                </p>
                <span style={{background:'#1A1D26',border:'1px solid rgba(255,255,255,.06)',borderRadius:8,padding:'4px 10px',fontSize:10,fontWeight:700,color:'#4A4E65',textTransform:'uppercase'}}>
                  {filtered.length} itens
                </span>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:12}}>
                {filtered.map(t=><TxCard key={t.id} t={t} onEdit={openEdit} onDel={del} onPay={pay}/>)}
                {filtered.length===0&&(
                  <div style={{textAlign:'center',padding:'60px 20px',background:'#12141C',borderRadius:26,border:'2px dashed rgba(255,255,255,.05)'}}>
                    <div style={{marginBottom:12,display:'flex',justifyContent:'center'}}><I.Cal s={34} c="#2A2D3A"/></div>
                    <p style={{color:'#3A3E55',fontSize:14,margin:0,fontStyle:'italic'}}>Nenhum lançamento encontrado.</p>
                  </div>
                )}
              </div>
            </div>
          </div>
        )}
      </div>

      {/* toast */}
      {toast&&(
        <div style={{position:'fixed',bottom:100,left:'50%',transform:'translateX(-50%)',
          background:toast.ok?'#1A2E1A':'#2E1A1A',
          border:`1px solid ${toast.ok?'rgba(34,197,94,.3)':'rgba(239,68,68,.3)'}`,
          borderRadius:16,padding:'12px 20px',
          color:toast.ok?'#22C55E':'#F87171',
          fontSize:13,fontWeight:600,zIndex:60,whiteSpace:'nowrap',
          boxShadow:'0 8px 32px rgba(0,0,0,.4)',animation:'fadeUp .3s ease both'}}>
          {toast.ok?'✓ ':'✕ '}{toast.msg}
        </div>
      )}

      {/* FAB */}
      {!isInv&&(
        <button onClick={openAdd} style={{position:'fixed',bottom:28,right:20,width:58,height:58,borderRadius:20,
          background:'linear-gradient(135deg,#6366F1,#8B5CF6)',border:'none',cursor:'pointer',
          display:'flex',alignItems:'center',justifyContent:'center',
          boxShadow:'0 16px 40px rgba(99,102,241,.5)',zIndex:40}}>
          <I.Plus s={26} c="#fff"/>
        </button>
      )}

      {/* modal transação */}
      {showTx&&(
        <Modal onClose={()=>{setShowTx(false);setEditId(null);}}>
          <p className="syne" style={{margin:'0 0 20px',fontSize:20,fontWeight:800,color:'#E8EAF0'}}>
            {editId?'Editar Lançamento':selM===-1?'Novo Lançamento':`Lançar em ${MNAMES[selM]}`}
          </p>
          <form onSubmit={submitTx} style={{display:'flex',flexDirection:'column',gap:12}} autoComplete="off">
            {/* receita / despesa */}
            <div style={{display:'flex',gap:6,background:'#14161F',borderRadius:14,padding:5}}>
              {[['income','Receita','#22C55E'],['expense','Despesa','#F87171']].map(([v,l,c])=>(
                <button key={v} type="button" onClick={()=>setForm(f=>({...f,type:v}))}
                  style={{flex:1,padding:12,borderRadius:10,border:'none',cursor:'pointer',fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:12,letterSpacing:'.06em',transition:'all .2s',
                    ...(form.type===v?{background:'#1E2132',color:c,boxShadow:'0 4px 12px rgba(0,0,0,.3)'}:{background:'transparent',color:'#3A3E55'})}}>
                  {l.toUpperCase()}
                </button>
              ))}
            </div>
            {/* descrição */}
            <div>
              <label style={{fontSize:9,fontWeight:800,color:'#4A4E65',textTransform:'uppercase',letterSpacing:'.12em',display:'block',marginBottom:6,marginLeft:4}}>Descrição</label>
              <input className="field" type="text" placeholder="Ex: Salário, Enel, Aluguel..." value={form.desc} onChange={e=>setForm(f=>({...f,desc:e.target.value}))} required/>
            </div>
            {/* valor */}
            <div>
              <label style={{fontSize:9,fontWeight:800,color:'#4A4E65',textTransform:'uppercase',letterSpacing:'.12em',display:'block',marginBottom:6,marginLeft:4}}>Valor (R$)</label>
              <input className="field syne" type="number" step="0.01" min="0.01" placeholder="0,00"
                style={{fontSize:22,fontWeight:800,color:'#818CF8'}}
                value={form.amt} onChange={e=>setForm(f=>({...f,amt:e.target.value}))} required/>
            </div>
            {/* vencimento */}
            <div>
              <label style={{fontSize:9,fontWeight:800,color:'#4A4E65',textTransform:'uppercase',letterSpacing:'.12em',display:'block',marginBottom:6,marginLeft:4}}>Vencimento</label>
              <input className="field" type="date" required autoComplete="off" value={form.due} onChange={e=>setForm(f=>({...f,due:e.target.value}))} style={{fontSize:13}}/>
            </div>
            {/* pagamento — toggle seguro para iOS */}
            <PaidToggle
              paid={form.paid}
              onChange={v=>setForm(f=>({...f,paid:v}))}
            />
            {/* categoria */}
            <div>
              <label style={{fontSize:9,fontWeight:800,color:'#4A4E65',textTransform:'uppercase',letterSpacing:'.12em',display:'block',marginBottom:6,marginLeft:4}}>Categoria</label>
              <select className="field" value={form.cat} onChange={e=>setForm(f=>({...f,cat:e.target.value}))}>
                {CATS.map(c=><option key={c} value={c}>{c}</option>)}
              </select>
            </div>
            <button className="btn" type="submit" style={{marginTop:6}}>Salvar Lançamento</button>
          </form>
        </Modal>
      )}

      {/* modal investimento */}
      {showInv&&(
        <Modal onClose={()=>setShowInv(false)}>
          <p className="syne" style={{margin:'0 0 20px',fontSize:20,fontWeight:800,color:'#E8EAF0'}}>Nova Movimentação</p>
          <form onSubmit={submitInv} style={{display:'flex',flexDirection:'column',gap:12}}>
            <div style={{background:'#14161F',borderRadius:14,padding:'14px 16px'}}>
              <p style={{margin:0,fontSize:14,fontWeight:700,color:'#818CF8'}}>{invF.invType}</p>
            </div>
            <div>
              <label style={{fontSize:9,fontWeight:800,color:'#4A4E65',textTransform:'uppercase',letterSpacing:'.12em',display:'block',marginBottom:6,marginLeft:4}}>Tipo</label>
              <div style={{display:'flex',gap:5,background:'#14161F',borderRadius:14,padding:5}}>
                {['Saldo Inicial','Aporte','Juros'].map(t=>(
                  <button key={t} type="button" onClick={()=>setInvF(f=>({...f,action:t}))}
                    style={{flex:1,padding:'10px 4px',borderRadius:10,border:'none',cursor:'pointer',fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:9,letterSpacing:'.06em',textTransform:'uppercase',transition:'all .2s',
                      ...(invF.action===t?{background:'linear-gradient(135deg,#6366F1,#8B5CF6)',color:'#fff'}:{background:'transparent',color:'#3A3E55'})}}>
                    {t}
                  </button>
                ))}
              </div>
            </div>
            <div>
              <label style={{fontSize:9,fontWeight:800,color:'#4A4E65',textTransform:'uppercase',letterSpacing:'.12em',display:'block',marginBottom:6,marginLeft:4}}>Valor R$</label>
              <input className="field syne" type="number" step="0.01" min="0.01" placeholder="0,00"
                style={{fontSize:22,fontWeight:800,color:'#818CF8'}}
                value={invF.amt} onChange={e=>setInvF(f=>({...f,amt:e.target.value}))} required/>
            </div>
            <div>
              <label style={{fontSize:9,fontWeight:800,color:'#4A4E65',textTransform:'uppercase',letterSpacing:'.12em',display:'block',marginBottom:6,marginLeft:4}}>Data</label>
              <input className="field" type="date" required value={invF.date} onChange={e=>setInvF(f=>({...f,date:e.target.value}))} style={{fontSize:13}}/>
            </div>
            <button className="btn" type="submit" style={{marginTop:6,background:'linear-gradient(135deg,#4F46E5,#7C3AED)'}}>Registrar na Carteira</button>
          </form>
        </Modal>
      )}
    </div>
  );
}

// versão do app — atualizar a cada deploy para confirmar cache limpo
const APP_VERSION = 'v5 · 09/03/2026';

// exibir versão discreta no canto inferior direito
const VersionTag = () => (
  <div style={{
    position:'fixed', bottom:8, right:12,
    fontSize:9, color:'#2A2D3A', fontFamily:'DM Sans,sans-serif',
    pointerEvents:'none', userSelect:'none', zIndex:0,
  }}>{APP_VERSION}</div>
);

function Root(){
  return <>
    <App/>
    <VersionTag/>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
