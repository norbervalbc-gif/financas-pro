(function(){
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 512;
  const ctx = canvas.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 512, 512);
  grad.addColorStop(0, '#6366F1');
  grad.addColorStop(1, '#8B5CF6');
  ctx.fillStyle = grad;
  const r = 110;
  ctx.beginPath();
  ctx.moveTo(r, 0); ctx.lineTo(512-r, 0);
  ctx.quadraticCurveTo(512, 0, 512, r);
  ctx.lineTo(512, 512-r);
  ctx.quadraticCurveTo(512, 512, 512-r, 512);
  ctx.lineTo(r, 512);
  ctx.quadraticCurveTo(0, 512, 0, 512-r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fill();
  const grad2 = ctx.createLinearGradient(0, 0, 512, 512);
  grad2.addColorStop(0, 'rgba(255,255,255,0.15)');
  grad2.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = grad2;
  ctx.fill();
  ctx.strokeStyle = '#ffffff';
  ctx.fillStyle = '#ffffff';
  ctx.lineWidth = 22;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  const s = 2.8, ox = 82, oy = 100;
  ctx.beginPath();
  ctx.roundRect(ox+20*s, oy+60*s, 140*s, 110*s, 12);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(ox, oy+75*s);
  ctx.lineTo(ox+180*s, oy+75*s);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(ox+148*s, oy+115*s, 18*s, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.fill();
  ctx.strokeStyle = '#ffffff';
  ctx.beginPath();
  ctx.moveTo(ox+50*s, oy+75*s);
  ctx.quadraticCurveTo(ox+50*s, oy+40*s, ox+90*s, oy+40*s);
  ctx.quadraticCurveTo(ox+130*s, oy+40*s, ox+130*s, oy+75*s);
  ctx.stroke();
  const dataUrl = canvas.toDataURL('image/png');
  const link = document.createElement('link');
  link.rel = 'apple-touch-icon';
  link.href = dataUrl;
  document.head.appendChild(link);
  const link2 = document.createElement('link');
  link2.rel = 'icon';
  link2.type = 'image/png';
  link2.href = dataUrl;
  document.head.appendChild(link2);
})();
</script>

// ── Firebase helpers ───────────────────────────────────────────────────────
function waitForFB(cb, tries=0) {
  if (window.__FB__) { cb(window.__FB__); return; }
  if (tries > 50) { console.error('Firebase não carregou'); return; }
  setTimeout(() => waitForFB(cb, tries+1), 100);
}

// ── Export / Import ────────────────────────────────────────────────────────
function exportData(userEmail, transactions) {
  const payload = { version:1, exportedAt:new Date().toISOString(), user:{email:userEmail}, transactions };
  const blob = new Blob([JSON.stringify(payload,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `financas-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(file, currentTransactions, onSuccess, onError) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.transactions || !Array.isArray(data.transactions)) throw new Error('Arquivo inválido');
      const existingIds = new Set(currentTransactions.map(t => t.id));
      const merged = [...currentTransactions, ...data.transactions.filter(t => !existingIds.has(t.id))];
      onSuccess(merged);
    } catch { onError('Arquivo inválido ou corrompido.'); }
  };
  reader.readAsText(file);
}

// ── AuthScreen ─────────────────────────────────────────────────────────────
function AuthScreen({onLogin}){
  const[mode,setMode]=useState('login');
  const[email,setEmail]=useState('');
  const[name,setName]=useState('');
  const[pass,setPass]=useState('');
  const[confirm,setConfirm]=useState('');
  const[showPw,setShowPw]=useState(false);
  const[error,setError]=useState('');
  const[loading,setLoading]=useState(false);

  const submit=e=>{
    e.preventDefault();
    setError('');setLoading(true);
    waitForFB(({auth,createUserWithEmailAndPassword,signInWithEmailAndPassword,updateProfile})=>{
      if(mode==='register'){
        if(pass.length<6){setError('Senha precisa ter ao menos 6 caracteres.');setLoading(false);return;}
        if(pass!==confirm){setError('Senhas não conferem.');setLoading(false);return;}
        createUserWithEmailAndPassword(auth,email.trim(),pass)
          .then(cred=>updateProfile(cred.user,{displayName:name}).then(()=>onLogin(cred.user)))
          .catch(err=>{
            if(err.code==='auth/email-already-in-use') setError('E-mail já cadastrado.');
            else if(err.code==='auth/invalid-email') setError('E-mail inválido.');
            else setError('Erro ao criar conta. Tente novamente.');
            setLoading(false);
          });
      } else {
        signInWithEmailAndPassword(auth,email.trim(),pass)
          .then(cred=>onLogin(cred.user))
          .catch(err=>{
            if(err.code==='auth/user-not-found'||err.code==='auth/wrong-password'||err.code==='auth/invalid-credential') setError('E-mail ou senha incorretos.');
            else setError('Erro ao entrar. Tente novamente.');
            setLoading(false);
          });
      }
    });
  };

  return(
    <div style={{minHeight:'100vh',background:'#0D0F14',display:'flex',alignItems:'center',justifyContent:'center',padding:'20px'}}>
      <div className="anim-fade-up" style={{width:'100%',maxWidth:'380px'}}>
        <div style={{textAlign:'center',marginBottom:'40px'}}>
          <div className="anim-pulse" style={{width:'72px',height:'72px',background:'linear-gradient(135deg,#6366F1,#8B5CF6)',borderRadius:'24px',margin:'0 auto 20px',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <Icons.Wallet size={34} color="#fff"/>
          </div>
          <h1 className="syne" style={{margin:'0 0 8px',fontSize:'32px',fontWeight:800,background:'linear-gradient(135deg,#818CF8,#C084FC)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>
            Finanças <span style={{color:'#fff',WebkitTextFillColor:'#fff'}}>Pro</span>
          </h1>
          <p style={{margin:0,color:'#4A4E65',fontSize:'14px'}}>{mode==='login'?'Bem-vindo de volta':'Crie sua conta gratuita'}</p>
        </div>
        <div style={{background:'#12141C',borderRadius:'28px',padding:'28px',border:'1px solid rgba(255,255,255,.06)'}}>
          <div style={{display:'flex',background:'#0D0F14',borderRadius:'16px',padding:'4px',marginBottom:'24px'}}>
            {[['login','Entrar'],['register','Cadastrar']].map(([v,l])=>(
              <button key={v} onClick={()=>{setMode(v);setError('');}} style={{flex:1,padding:'12px',borderRadius:'12px',border:'none',cursor:'pointer',fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:'13px',transition:'all .2s',...(mode===v?{background:'linear-gradient(135deg,#6366F1,#8B5CF6)',color:'#fff'}:{background:'transparent',color:'#3A3E55'})}}>
                {l}
              </button>
            ))}
          </div>
          <form onSubmit={submit} style={{display:'flex',flexDirection:'column',gap:'12px'}}>
            {mode==='register'&&(
              <div style={{position:'relative'}}>
                <div style={{position:'absolute',left:'16px',top:'50%',transform:'translateY(-50%)'}}><Icons.User size={16} color="#4A4E65"/></div>
                <input className="field" style={{paddingLeft:'44px'}} type="text" placeholder="Seu nome" value={name} onChange={e=>setName(e.target.value)} required/>
              </div>
            )}
            <div style={{position:'relative'}}>
              <div style={{position:'absolute',left:'16px',top:'50%',transform:'translateY(-50%)'}}><Icons.Mail size={16} color="#4A4E65"/></div>
              <input className="field" style={{paddingLeft:'44px'}} type="email" placeholder="E-mail" value={email} onChange={e=>setEmail(e.target.value)} required/>
            </div>
            <div style={{position:'relative'}}>
              <div style={{position:'absolute',left:'16px',top:'50%',transform:'translateY(-50%)'}}><Icons.Lock size={16} color="#4A4E65"/></div>
              <input className="field" style={{paddingLeft:'44px',paddingRight:'48px'}} type={showPw?'text':'password'} placeholder="Senha" value={pass} onChange={e=>setPass(e.target.value)} required/>
              <button type="button" onClick={()=>setShowPw(!showPw)} style={{position:'absolute',right:'14px',top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',display:'flex',alignItems:'center'}}>
                {showPw?<Icons.EyeOff size={16} color="#4A4E65"/>:<Icons.Eye size={16} color="#4A4E65"/>}
              </button>
            </div>
            {mode==='register'&&(
              <div style={{position:'relative'}}>
                <div style={{position:'absolute',left:'16px',top:'50%',transform:'translateY(-50%)'}}><Icons.Shield size={16} color="#4A4E65"/></div>
                <input className="field" style={{paddingLeft:'44px'}} type={showPw?'text':'password'} placeholder="Confirmar senha" value={confirm} onChange={e=>setConfirm(e.target.value)} required/>
              </div>
            )}
            {error&&<div style={{background:'rgba(239,68,68,.12)',border:'1px solid rgba(239,68,68,.3)',borderRadius:'12px',padding:'12px 16px',color:'#F87171',fontSize:'13px',fontWeight:500}}>{error}</div>}
            <button className="btn-primary" type="submit" disabled={loading} style={{marginTop:'8px',display:'flex',alignItems:'center',justifyContent:'center',gap:'8px'}}>
              {loading?<div className="spin" style={{width:'18px',height:'18px',border:'2px solid rgba(255,255,255,.3)',borderTopColor:'#fff',borderRadius:'50%'}}/>:(mode==='login'?'Entrar na conta':'Criar conta')}
            </button>
          </form>
        </div>
        <p style={{textAlign:'center',color:'#2A2D3A',fontSize:'12px',marginTop:'24px'}}>Dados sincronizados na nuvem ☁️</p>
      </div>
    </div>
  );

  else if(name.includes('enel')){Ic=Icons.Zap;bg='rgba(245,158,11,.12)';color='#F59E0B';}
  else if(name.includes('sabesp')){Ic=Icons.Droplets;bg='rgba(59,130,246,.12)';color='#60A5FA';}
  else if(name.includes('telefone')||name.includes('internet')){Ic=Icons.Wifi;bg='rgba(168,85,247,.12)';color='#C084FC';}
  else if(name.includes('nubank')){Ic=Icons.CreditCard;bg='rgba(168,85,247,.12)';color='#A855F7';}
  else if(name.includes('itaú')||name.includes('black')||name.includes('zero')){Ic=Icons.CreditCard;bg='rgba(249,115,22,.12)';color='#FB923C';}
  else if(name.includes('aliment')||name.includes('almoço')||name.includes('café')){Ic=Icons.Utensils;bg='rgba(239,68,68,.12)';color='#F87171';}
  return <div style={{width:'46px',height:'46px',borderRadius:'16px',background:bg,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><Ic size={20} color={color}/></div>;
}

// ── Modal ──────────────────────────────────────────────────────────────────
function Modal({children,onClose}){
  return(
    <div className="anim-fade-in" style={{position:'fixed',inset:0,background:'rgba(0,0,0,.8)',backdropFilter:'blur(12px)',zIndex:50,display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
      <div className="anim-slide-up" style={{background:'#12141C',width:'100%',maxWidth:'500px',borderRadius:'32px 32px 0 0',padding:'24px 22px 48px',maxHeight:'95vh',overflowY:'auto',border:'1px solid rgba(255,255,255,.08)',borderBottom:'none'}}>
        <div style={{display:'flex',justifyContent:'flex-end',marginBottom:'4px'}}>
          <button onClick={onClose} style={{background:'#1A1D26',border:'none',borderRadius:'12px',padding:'8px',cursor:'pointer',display:'flex',alignItems:'center'}}><Icons.X size={18} color="#5A5E75"/></button>
        </div>
        {children}
      </div>
    </div>
  );
}

// ── TxCard ─────────────────────────────────────────────────────────────────
function TxCard({t,onEdit,onDelete,onPay}){
  const[show,setShow]=useState(false);
  return(
    <div onTouchStart={()=>setShow(true)} onTouchEnd={()=>setTimeout(()=>setShow(false),2000)} onMouseEnter={()=>setShow(true)} onMouseLeave={()=>setShow(false)}
      style={{background:'#12141C',border:`1px solid ${show?'rgba(99,102,241,.3)':'rgba(255,255,255,.06)'}`,borderRadius:'24px',padding:'18px',display:'flex',flexDirection:'column',gap:'14px',transition:'border-color .2s'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{display:'flex',alignItems:'center',gap:'12px',flex:1,minWidth:0}}>
          <CategoryIcon category={t.category} description={t.description} type={t.type}/>
          <div style={{minWidth:0}}>
            <p style={{margin:0,fontSize:'14px',fontWeight:600,color:'#E8EAF0',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{t.description}</p>
            <span style={{fontSize:'10px',fontWeight:800,color:'#818CF8',background:'rgba(99,102,241,.1)',padding:'2px 8px',borderRadius:'6px',textTransform:'uppercase',letterSpacing:'.06em'}}>{t.category}</span>
          </div>
        </div>
        <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:'8px',flexShrink:0,marginLeft:'10px'}}>
          <p className="syne" style={{margin:0,fontSize:'14px',fontWeight:800,color:t.type==='income'?'#22C55E':'#E8EAF0'}}>{t.type==='income'?'+':'-'} {fmt(t.amount)}</p>
          <div style={{display:'flex',gap:'6px',opacity:show?1:0,transition:'opacity .2s'}}>
            <button onClick={()=>onEdit(t)} style={{background:'rgba(99,102,241,.1)',border:'none',borderRadius:'8px',padding:'6px',cursor:'pointer',display:'flex',alignItems:'center'}}><Icons.Edit3 size={12} color="#818CF8"/></button>
            <button onClick={()=>onDelete(t.id)} style={{background:'rgba(239,68,68,.1)',border:'none',borderRadius:'8px',padding:'6px',cursor:'pointer',display:'flex',alignItems:'center'}}><Icons.Trash2 size={12} color="#F87171"/></button>
          </div>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px',paddingTop:'12px',borderTop:'1px solid rgba(255,255,255,.04)'}}>
        <div>
          <p style={{margin:'0 0 2px',fontSize:'9px',fontWeight:800,color:'#3A3E55',textTransform:'uppercase',letterSpacing:'.1em'}}>Vencimento</p>
          <p style={{margin:0,fontSize:'12px',fontWeight:600,color:'#8A8FA8'}}>{fmtDate(t.dueDate||t.date)}</p>
        </div>
        <div style={{textAlign:'right'}}>
          <p style={{margin:'0 0 2px',fontSize:'9px',fontWeight:800,color:'#3A3E55',textTransform:'uppercase',letterSpacing:'.1em'}}>Pagamento</p>
          <p style={{margin:0,fontSize:'12px',fontWeight:600,color:t.paymentDate?'#22C55E':'#F59E0B'}}>{t.paymentDate?fmtDate(t.paymentDate):'Em Aberto'}</p>
        </div>
      </div>
      {t.type==='expense'&&!t.paymentDate&&(
        <button onClick={()=>onPay(t.id)} style={{width:'100%',background:'rgba(99,102,241,.08)',border:'1px solid rgba(99,102,241,.15)',borderRadius:'14px',padding:'12px',color:'#818CF8',fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:'10px',letterSpacing:'.12em',textTransform:'uppercase',cursor:'pointer'}}>
          Marcar como Pago
        </button>
      )}
    </div>
  );
}

// ── Main App ───────────────────────────────────────────────────────────────
function App(){
  const[user,setUser]=useState(null);
  const[authReady,setAuthReady]=useState(false);
  const[transactions,setTx]=useState([]);
  const[saving,setSaving]=useState(false);
  const[showModal,setShowModal]=useState(false);
  const[editId,setEditId]=useState(null);
  const[showInv,setShowInv]=useState(false);
  const[selMonth,setSelMonth]=useState(new Date().getMonth());
  const[selYear,setSelYear]=useState(new Date().getFullYear());
  const[invForm,setInvForm]=useState({investmentType:'Tesouro Direto Selic',actionType:'Aporte',amount:'',date:new Date().toISOString().split('T')[0]});
  const[toast,setToast]=useState(null);
  const[form,setForm]=useState({type:'expense',description:'',amount:'',dueDate:'',paymentDate:'',category:CATEGORIES[0]});
  const importRef = useRef();
  const unsubRef = useRef(null);

  // Auth listener
  useEffect(()=>{
    waitForFB(({auth,onAuthStateChanged})=>{
      const unsub = onAuthStateChanged(auth, u=>{
        setUser(u);
        setAuthReady(true);
      });
      return ()=>unsub();
    });
  },[]);

  // Load data from Firestore when user logs in
  useEffect(()=>{
    if(unsubRef.current){ unsubRef.current(); unsubRef.current=null; }
    if(!user) return;
    waitForFB(({db,doc,onSnapshot})=>{
      const ref = doc(db,'users',user.uid,'data','transactions');
      unsubRef.current = onSnapshot(ref, snap=>{
        if(snap.exists()){
          setTx(snap.data().list||[]);
        } else {
          setTx([]);
        }
      });
    });
    return ()=>{ if(unsubRef.current) unsubRef.current(); };
  },[user]);

  // Save to Firestore
  const saveToCloud = useCallback(async(newTx)=>{
    if(!user) return;
    setSaving(true);
    waitForFB(async({db,doc,setDoc})=>{
      try{
        await setDoc(doc(db,'users',user.uid,'data','transactions'),{list:newTx,updatedAt:new Date().toISOString()});
      }catch(e){ console.error(e); }
      setSaving(false);
    });
  },[user]);

  const showToast=(msg,ok=true)=>{setToast({msg,ok});setTimeout(()=>setToast(null),3000);};

  const logout=()=>{
    waitForFB(({auth,signOut})=>{
      signOut(auth).then(()=>setUser(null));
    });
  };

  // Investments
  const investments = useMemo(()=>{
    const types=['Tesouro Direto Selic','Crédito Privado Itaú'];
    return types.map(type=>{
      const moves = transactions.filter(t=>t.investmentType===type);
      const bal = moves.reduce((s,m)=>s+(m.type==='income'?m.amount:-m.amount),0);
      return {type,moves,bal};
    });
  },[transactions]);

  const globalBal = useMemo(()=>{
  const tx = transactions.filter(t=>!t.investmentType);
  return tx.reduce((s,t)=>{
    if(t.type==='income') return s + t.amount;
    if(t.type==='expense' && t.paymentDate) return s - t.amount;
    return s;
  },0);
},[transactions]);

  const isInv = selMonth===-2;

  const filtered = useMemo(()=>{
    if(selMonth===-1) return transactions.filter(t=>!t.investmentType&&t.year===selYear);
    if(selMonth===-2) return [];
    return transactions.filter(t=>{
      if(t.investmentType) return false;
      const d=t.dueDate||t.date||'';
      if(!d) return false;
      const[y,m]=d.split('-');
      return parseInt(m)-1===selMonth&&parseInt(y)===selYear;
    });
  },[transactions,selMonth,selYear]);

  const summary = useMemo(()=>({
    income:filtered.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0),
    expense:filtered.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0),
  }),[filtered]);

  const updateTx = async(newList)=>{
    setTx(newList);
    await saveToCloud(newList);
  };

  const del=async(id)=>{
    const n=transactions.filter(t=>t.id!==id);
    await updateTx(n);
    showToast('Lançamento excluído.');
  };

  const pay=async(id)=>{
    const n=transactions.map(t=>t.id===id?{...t,paymentDate:new Date().toISOString().split('T')[0]}:t);
    await updateTx(n);
    showToast('Marcado como pago!');
  };

  const openEdit=t=>{
    setForm({type:t.type,description:t.description,amount:String(t.amount),dueDate:t.dueDate||'',paymentDate:t.paymentDate||'',category:t.category});
    setEditId(t.id);
    setShowModal(true);
  };

  const openAdd=()=>{
    setForm({type:'expense',description:'',amount:'',dueDate:'',paymentDate:'',category:CATEGORIES[0]});
    setEditId(null);
    setShowModal(true);
  };

  const submitTx=async e=>{
    e.preventDefault();
    const t={
      id:editId||genId(),
      type:form.type,
      description:form.description,
      amount:parseFloat(form.amount),
      dueDate:form.dueDate,
      paymentDate:form.paymentDate||null,
      category:form.category,
      year:selYear,
    };
    let n;
    if(editId) n=transactions.map(x=>x.id===editId?t:x);
    else n=[...transactions,t];
    await updateTx(n);
    setShowModal(false);
    setEditId(null);
    showToast(editId?'Lançamento atualizado!':'Lançamento adicionado!');
  };

  const submitInv=async e=>{
    e.preventDefault();
    const t={
      id:genId(),
      investmentType:invForm.investmentType,
      type:invForm.actionType==='Saldo Inicial'||invForm.actionType==='Aporte'||invForm.actionType==='Juros'?'income':'expense',
      description:invForm.actionType,
      amount:parseFloat(invForm.amount),
      date:invForm.date,
      category:'Investimento',
    };
    await updateTx([...transactions,t]);
    setShowInv(false);
    showToast('Movimentação registrada!');
  };

  const lbl=(k,label,req)=>(
    <div>
      <label style={{fontSize:'9px',fontWeight:800,color:'#4A4E65',textTransform:'uppercase',letterSpacing:'.12em',display:'block',marginBottom:'6px',marginLeft:'4px'}}>{label}</label>
      <input className="field" type="date" required={req} value={form[k]} onChange={e=>setForm({...form,[k]:e.target.value})} style={{fontSize:'13px'}}/>
    </div>
  );

  // Loading
  if(!authReady){
    return(
      <div style={{minHeight:'100vh',background:'#0D0F14',display:'flex',alignItems:'center',justifyContent:'center'}}>
        <div className="spin" style={{width:'40px',height:'40px',border:'3px solid rgba(99,102,241,.2)',borderTopColor:'#6366F1',borderRadius:'50%'}}/>
      </div>
    );
  }

  if(!user) return <AuthScreen onLogin={setUser}/>;

  return(
    <div style={{maxWidth:'500px',margin:'0 auto',minHeight:'100vh',background:'#0D0F14',paddingBottom:'100px'}}>
      {/* Header */}
      <div style={{padding:'56px 20px 20px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div>
          <p style={{margin:0,fontSize:'10px',fontWeight:800,color:'#3A3E55',letterSpacing:'.15em',textTransform:'uppercase'}}>
            {saving?'Salvando...':'☁️ Sincronizado'}
          </p>
          <h2 className="syne" style={{margin:'4px 0 0',fontSize:'22px',fontWeight:800,color:'#E8EAF0'}}>
            {user.displayName||user.email?.split('@')[0]}
          </h2>
        </div>
        <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
          {/* Export */}
          <button onClick={()=>exportData(user.email,transactions.filter(t=>!t.investmentType))}
            style={{background:'rgba(34,197,94,.1)',border:'1px solid rgba(34,197,94,.2)',borderRadius:'12px',padding:'10px',cursor:'pointer',display:'flex',alignItems:'center'}}>
            <Icons.Download size={16} color="#22C55E"/>
          </button>
          {/* Import */}
          <button onClick={()=>importRef.current.click()}
            style={{background:'rgba(139,92,246,.1)',border:'1px solid rgba(139,92,246,.2)',borderRadius:'12px',padding:'10px',cursor:'pointer',display:'flex',alignItems:'center'}}>
            <Icons.Upload size={16} color="#8B5CF6"/>
          </button>
          <input ref={importRef} type="file" accept=".json" style={{display:'none'}} onChange={e=>{
            const f=e.target.files[0]; if(!f) return;
            importData(f,transactions,async merged=>{await updateTx(merged);showToast(`${merged.length-transactions.length} importados!`);},msg=>showToast(msg,false));
            e.target.value='';
          }}/>
          {/* Logout */}
          <button onClick={logout} style={{background:'rgba(248,113,113,.1)',border:'1px solid rgba(248,113,113,.2)',borderRadius:'12px',padding:'10px',cursor:'pointer',display:'flex',alignItems:'center'}}>
            <Icons.LogOut size={16} color="#F87171"/>
          </button>
        </div>
      </div>

      {/* Year selector */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:'16px',padding:'0 20px 16px'}}>
        <button onClick={()=>setSelYear(y=>y-1)} style={{background:'#1A1D26',border:'1px solid rgba(255,255,255,.06)',borderRadius:'10px',padding:'8px',cursor:'pointer',display:'flex',alignItems:'center'}}>
          <Icons.ChevronLeft size={16} color="#5A5E75"/>
        </button>
        <span className="syne" style={{fontSize:'18px',fontWeight:800,color:'#E8EAF0',minWidth:'60px',textAlign:'center'}}>{selYear}</span>
        <button onClick={()=>setSelYear(y=>y+1)} style={{background:'#1A1D26',border:'1px solid rgba(255,255,255,.06)',borderRadius:'10px',padding:'8px',cursor:'pointer',display:'flex',alignItems:'center'}}>
          <Icons.ChevronRight size={16} color="#5A5E75"/>
        </button>
      </div>

      {/* Month tabs */}
      <div className="no-scrollbar" style={{display:'flex',gap:'6px',overflowX:'auto',padding:'0 20px 20px'}}>
        {[[-1,'TODOS'],[-2,'APLIC.'],...MONTHS.map((m,i)=>[i,m.slice(0,3).toUpperCase()])].map(([i,label])=>(
          <button key={i} onClick={()=>setSelMonth(i)}
            style={{flexShrink:0,padding:'10px 16px',borderRadius:'14px',border:'none',cursor:'pointer',fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:'11px',letterSpacing:'.08em',transition:'all .2s',
              ...(selMonth===i?{background:'linear-gradient(135deg,#6366F1,#8B5CF6)',color:'#fff',boxShadow:'0 6px 20px rgba(99,102,241,.35)'}:{background:'#12141C',color:'#3A3E55',border:'1px solid rgba(255,255,255,.04)'})}}>
            {label}
          </button>
        ))}
      </div>

      {/* Content */}
      <div style={{padding:'0 20px'}}>
        {isInv?(
          <div className="anim-fade-up" style={{display:'flex',flexDirection:'column',gap:'16px'}}>
            {investments.map(inv=>(
              <div key={inv.type} style={{background:'linear-gradient(135deg,#1A1D26,#12141C)',border:'1px solid rgba(255,255,255,.08)',borderRadius:'28px',padding:'24px'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'20px'}}>
                  <div>
                    <p className="syne" style={{margin:0,fontSize:'10px',fontWeight:800,color:'#4A4E65',letterSpacing:'.15em',textTransform:'uppercase'}}>{inv.type}</p>
                    <p className="syne" style={{margin:'6px 0 0',fontSize:'26px',fontWeight:800,color:'#818CF8'}}>{fmt(inv.bal)}</p>
                  </div>
                  <div style={{background:'rgba(99,102,241,.1)',borderRadius:'16px',padding:'12px'}}><Icons.Landmark size={22} color="#818CF8"/></div>
                </div>
                <button onClick={()=>{setInvForm({...invForm,investmentType:inv.type});setShowInv(true);}}
                  style={{width:'100%',background:'rgba(99,102,241,.08)',border:'1px solid rgba(99,102,241,.15)',borderRadius:'14px',padding:'12px',color:'#818CF8',fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:'10px',letterSpacing:'.12em',textTransform:'uppercase',cursor:'pointer'}}>
                  + Nova Movimentação
                </button>
              </div>
            ))}
          </div>
        ):(
          <div className="anim-fade-up" style={{display:'flex',flexDirection:'column',gap:'14px'}}>
            {/* Saldo */}
            <div style={{background:'linear-gradient(135deg,#1E40AF,#3730A3)',borderRadius:'28px',padding:'26px',display:'flex',justifyContent:'space-between',alignItems:'center',boxShadow:'0 20px 50px rgba(30,64,175,.4)'}}>
              <div>
                <p className="syne" style={{margin:0,fontSize:'10px',fontWeight:800,color:'rgba(255,255,255,.5)',letterSpacing:'.15em',textTransform:'uppercase'}}>Saldo Geral Acumulado</p>
                <p className="syne" style={{margin:'8px 0 0',fontSize:'30px',fontWeight:800,color:'#fff'}}>{fmt(globalBal)}</p>
              </div>
              <div style={{background:'rgba(255,255,255,.1)',borderRadius:'20px',padding:'14px'}}><Icons.Cloud size={26} color="#fff"/></div>
            </div>
            {/* Resumo */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
              <div style={{background:'#12141C',border:'1px solid rgba(255,255,255,.06)',borderRadius:'20px',padding:'16px'}}>
                <p style={{margin:'0 0 4px',fontSize:'9px',fontWeight:800,color:'#4A4E65',textTransform:'uppercase',letterSpacing:'.1em',display:'flex',alignItems:'center',gap:'4px'}}>
                  <Icons.TrendingUp size={10} color="#22C55E"/> Entradas
                </p>
                <p className="syne" style={{margin:0,fontSize:'17px',fontWeight:800,color:'#22C55E'}}>{fmt(summary.income)}</p>
              </div>
              <div style={{background:'#12141C',border:'1px solid rgba(255,255,255,.06)',borderRadius:'20px',padding:'16px'}}>
                <p style={{margin:'0 0 4px',fontSize:'9px',fontWeight:800,color:'#4A4E65',textTransform:'uppercase',letterSpacing:'.1em',display:'flex',alignItems:'center',gap:'4px'}}>
                  <Icons.TrendingDown size={10} color="#F87171"/> Saídas
                </p>
                <p className="syne" style={{margin:0,fontSize:'17px',fontWeight:800,color:'#F87171'}}>{fmt(summary.expense)}</p>
              </div>
            </div>
            {/* Lista */}
            <div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'14px',padding:'0 2px'}}>
                <p className="syne" style={{margin:0,fontSize:'15px',fontWeight:800,color:'#E8EAF0'}}>
                  {selMonth===-1?'Todos os Lançamentos':MONTHS[selMonth]}
                </p>
                <span style={{background:'#1A1D26',border:'1px solid rgba(255,255,255,.06)',borderRadius:'8px',padding:'4px 10px',fontSize:'10px',fontWeight:700,color:'#4A4E65',textTransform:'uppercase'}}>
                  {filtered.length} itens
                </span>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
                {filtered.map(t=><TxCard key={t.id} t={t} onEdit={openEdit} onDelete={del} onPay={pay}/>)}
                {filtered.length===0&&(
                  <div style={{textAlign:'center',padding:'60px 20px',background:'#12141C',borderRadius:'26px',border:'2px dashed rgba(255,255,255,.05)'}}>
                    <div style={{marginBottom:'12px',display:'flex',justifyContent:'center'}}><Icons.Calendar size={34} color="#2A2D3A"/></div>
                    <p style={{color:'#3A3E55',fontSize:'14px',margin:0,fontStyle:'italic'}}>Nenhum lançamento encontrado.</p>
                  </div>
                )}
              </div>
            </div>
          </div>
        )}
      </div>

      {/* Toast */}
      {toast&&(
        <div style={{position:'fixed',bottom:'100px',left:'50%',transform:'translateX(-50%)',background:toast.ok?'#1A2E1A':'#2E1A1A',border:`1px solid ${toast.ok?'rgba(34,197,94,.3)':'rgba(239,68,68,.3)'}`,borderRadius:'16px',padding:'12px 20px',color:toast.ok?'#22C55E':'#F87171',fontSize:'13px',fontWeight:600,zIndex:60,whiteSpace:'nowrap',boxShadow:'0 8px 32px rgba(0,0,0,.4)',animation:'fadeUp .3s ease both'}}>
          {toast.ok?'✓ ':'✕ '}{toast.msg}
        </div>
      )}

      {/* FAB */}
      {!isInv&&(
        <button onClick={openAdd} style={{position:'fixed',bottom:'28px',right:'20px',width:'58px',height:'58px',borderRadius:'20px',background:'linear-gradient(135deg,#6366F1,#8B5CF6)',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 16px 40px rgba(99,102,241,.5)',zIndex:40}}>
          <Icons.Plus size={26} color="#fff"/>
        </button>
      )}

      {/* Modal transação */}
      {showModal&&(
        <Modal onClose={()=>{setShowModal(false);setEditId(null);}}>
          <p className="syne" style={{margin:'0 0 20px',fontSize:'20px',fontWeight:800,color:'#E8EAF0'}}>{editId?'Editar Lançamento':selMonth===-1?'Novo Lançamento':`Lançar em ${MONTHS[selMonth]}`}</p>
          <form onSubmit={submitTx} style={{display:'flex',flexDirection:'column',gap:'12px'}}>
            <div style={{display:'flex',gap:'6px',background:'#14161F',borderRadius:'14px',padding:'5px'}}>
              {[['income','Receita','#22C55E'],['expense','Despesa','#F87171']].map(([v,l,c])=>(
                <button key={v} type="button" onClick={()=>setForm({...form,type:v})}
                  style={{flex:1,padding:'12px',borderRadius:'10px',border:'none',cursor:'pointer',fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:'12px',letterSpacing:'.06em',transition:'all .2s',...(form.type===v?{background:'#1E2132',color:c,boxShadow:'0 4px 12px rgba(0,0,0,.3)'}:{background:'transparent',color:'#3A3E55'})}}>
                  {l.toUpperCase()}
                </button>
              ))}
            </div>
            {[['description','Descrição','text'],['amount','Valor','number']].map(([k,l,t])=>(
              <div key={k}>
                <label style={{fontSize:'9px',fontWeight:800,color:'#4A4E65',textTransform:'uppercase',letterSpacing:'.12em',display:'block',marginBottom:'6px',marginLeft:'4px'}}>{l}</label>
                <input className="field" type={t} step={t==='number'?'0.01':undefined} placeholder={t==='number'?'0,00':'Ex: Salário, Enel...'} value={form[k]} onChange={e=>setForm({...form,[k]:e.target.value})} required
                  style={t==='number'?{fontSize:'22px',fontWeight:800,color:'#818CF8',fontFamily:'Syne,sans-serif'}:{}}/>
              </div>
            ))}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}}>
              {lbl('dueDate','Vencimento',true)}
              {lbl('paymentDate','Pagamento',false)}
            </div>
            <div>
              <label style={{fontSize:'9px',fontWeight:800,color:'#4A4E65',textTransform:'uppercase',letterSpacing:'.12em',display:'block',marginBottom:'6px',marginLeft:'4px'}}>Categoria</label>
              <select className="field" value={form.category} onChange={e=>setForm({...form,category:e.target.value})}>
                {CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
              </select>
            </div>
            <button className="btn-primary" type="submit" style={{marginTop:'6px'}}>Salvar Lançamento</button>
          </form>
        </Modal>
      )}

      {/* Modal investimento */}
      {showInv&&(
        <Modal onClose={()=>setShowInv(false)}>
          <p className="syne" style={{margin:'0 0 20px',fontSize:'20px',fontWeight:800,color:'#E8EAF0'}}>Nova Movimentação</p>
          <form onSubmit={submitInv} style={{display:'flex',flexDirection:'column',gap:'12px'}}>
            <div style={{background:'#14161F',borderRadius:'14px',padding:'14px 16px'}}>
              <p style={{margin:0,fontSize:'14px',fontWeight:700,color:'#818CF8'}}>{invForm.investmentType}</p>
            </div>
            <div>
              <label style={{fontSize:'9px',fontWeight:800,color:'#4A4E65',textTransform:'uppercase',letterSpacing:'.12em',display:'block',marginBottom:'6px',marginLeft:'4px'}}>Tipo de Lançamento</label>
              <div style={{display:'flex',gap:'5px',background:'#14161F',borderRadius:'14px',padding:'5px'}}>
                {['Saldo Inicial','Aporte','Juros'].map(t=>(
                  <button key={t} type="button" onClick={()=>setInvForm({...invForm,actionType:t})}
                    style={{flex:1,padding:'10px 4px',borderRadius:'10px',border:'none',cursor:'pointer',fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:'9px',letterSpacing:'.06em',textTransform:'uppercase',transition:'all .2s',...(invForm.actionType===t?{background:'linear-gradient(135deg,#6366F1,#8B5CF6)',color:'#fff'}:{background:'transparent',color:'#3A3E55'})}}>
                    {t}
                  </button>
                ))}
              </div>
            </div>
            <div>
              <label style={{fontSize:'9px',fontWeight:800,color:'#4A4E65',textTransform:'uppercase',letterSpacing:'.12em',display:'block',marginBottom:'6px',marginLeft:'4px'}}>Valor R$</label>
              <input className="field syne" type="number" step="0.01" placeholder="0,00" style={{fontSize:'22px',fontWeight:800,color:'#818CF8'}} value={invForm.amount} onChange={e=>setInvForm({...invForm,amount:e.target.value})} required/>
            </div>
            <div>
              <label style={{fontSize:'9px',fontWeight:800,color:'#4A4E65',textTransform:'uppercase',letterSpacing:'.12em',display:'block',marginBottom:'6px',marginLeft:'4px'}}>Data</label>
              <input className="field" type="date" required value={invForm.date} onChange={e=>setInvForm({...invForm,date:e.target.value})} style={{fontSize:'13px'}}/>
            </div>
            <button className="btn-primary" type="submit" style={{marginTop:'6px',background:'linear-gradient(135deg,#4F46E5,#7C3AED)'}}>Registrar na Carteira</button>
          </form>
        </Modal>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
